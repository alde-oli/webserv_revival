[SERVER_1]
name = DreamWorld
port = 8080
host = 127.0.0.1
default = TRUE
default_error_page = path/to/default/error_page.html
max_body_size = 100M
cookies = TRUE


[SERVER_1:ERROR]
404 = /server_1/error/404.html
500 = /server_1/error/500.html


[SERVER_1:ROUTES:MAIN]
path = /
root = /server_1/
methods = GET
default_page = /server_1/index.html


[SERVER_1:ROUTES:IMAGES]
path = /img/
root = /server_1/img/ 
methods = GET POST
listing = TRUE


[SERVER_1:ROUTES:KITTENLAND]
path = /kittenland/
root = /server_1/kittenland/
methods = GET POST DELETE
listing = TRUE
upload = TRUE


[SERVER_1:ROUTES:CGI]
path = /cgi/
root = /server_1/cgi/
methods = GET POST
cgi = .py .php .cgi .pl



[SERVER_2]
name = BoringSite
port = 2020
host = 127.0.0.1
default = TRUE
default_error_page = path/to/default/error_page.html
max_body_size = 10M


[SERVER_2:ERROR]
404 = /server_2/error/400.html
500 = /server_2/error/404.html


[SERVER_2:ROUTES:MAIN]
path = /
root = /server_2/
methods = GET
default_page = /server_2/index.html